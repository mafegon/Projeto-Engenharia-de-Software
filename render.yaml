services:
  - type: web
    name: projeto-estagios
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn --chdir backend --workers 1 config.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /health/
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.12
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: PLATFORM_REPOSITORY
        value: "django"
      - key: DJANGO_SECURE_HSTS_SECONDS
        value: "3600"
      - key: RUN_MIGRATIONS
        value: "false"
