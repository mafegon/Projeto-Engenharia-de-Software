{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vagas — Estágios Acadêmicos</title>
<link rel="stylesheet" href="{% static 'css/dist/styles.css' %}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen bg-[#f5f7fb] font-sans text-slate-900 antialiased">

  <!-- Cabeçalho -->
  <header class="bg-white border-b border-slate-200 sticky top-0 z-10">
    <div class="max-w-[1120px] mx-auto px-4 sm:px-6 min-h-16 py-3 sm:py-0 flex flex-col items-start gap-3 sm:h-16 sm:flex-row sm:items-center sm:justify-between">
      <a href="/vagas/" class="flex items-center gap-2.5">
        <div class="w-[34px] h-[34px] rounded-[9px] bg-blue-700 text-white flex items-center justify-center font-extrabold text-[17px]">E</div>
        <span class="font-extrabold tracking-tight text-slate-900">Estágios Acadêmicos</span>
      </a>
      <nav class="w-full sm:w-auto flex items-center justify-between sm:justify-start gap-3 sm:gap-6">
        <a href="/vagas/" class="text-sm font-bold text-blue-700">Vagas</a>
        <a href="/perfil/" class="text-sm font-semibold text-slate-500 hover:text-blue-700">Meu perfil</a>
        <a href="/perfil/" title="Meu perfil" aria-label="Meu perfil">
          <div data-user-initials aria-hidden="true" class="w-9 h-9 rounded-full bg-blue-100 text-blue-800 flex items-center justify-center font-bold text-[13px] animate-pulse"></div>
        </a>
      </nav>
    </div>
  </header>

  <main class="max-w-[1120px] mx-auto px-4 sm:px-6 pt-8 pb-16 flex flex-col gap-5">

    <div>
      <h1 class="text-2xl font-extrabold tracking-tight">Vagas de estágio</h1>
      <p id="resultado-contagem" class="mt-1 text-sm text-slate-500">6 vagas encontradas em Macapá e região</p>
    </div>

    <!-- Filtros e pesquisa -->
    <form id="filtros" class="bg-white border border-slate-200 rounded-[14px] p-4 flex flex-wrap gap-3">
      <input name="q" type="text" placeholder="Buscar por cargo, empresa ou palavra-chave" class="w-full sm:flex-1 sm:min-w-[240px] h-11 border border-slate-300 rounded-[10px] px-3.5 text-sm outline-none focus:border-blue-700">
      <select name="area" class="w-full sm:w-[170px] h-11 border border-slate-300 rounded-[10px] px-2.5 text-sm bg-white outline-none focus:border-blue-700">
        <option value="">Todas as áreas</option>
        <option>Tecnologia da Informação</option>
        <option>Engenharia</option>
        <option>Comunicação</option>
        <option>Administração</option>
        <option>Meio Ambiente</option>
      </select>
      <select name="modality" class="w-full sm:w-[150px] h-11 border border-slate-300 rounded-[10px] px-2.5 text-sm bg-white outline-none focus:border-blue-700">
        <option value="">Modalidade</option>
        <option value="onsite">Presencial</option>
        <option value="hybrid">Híbrido</option>
        <option value="remote">Remoto</option>
      </select>
      <select name="weekly_hours" class="w-full sm:w-[150px] h-11 border border-slate-300 rounded-[10px] px-2.5 text-sm bg-white outline-none focus:border-blue-700">
        <option value="">Carga horária</option>
        <option value="20">20h semanais</option>
        <option value="30">30h semanais</option>
      </select>
      <button type="submit" class="w-full sm:w-auto h-11 px-6 rounded-[10px] bg-blue-700 hover:bg-blue-800 text-white font-bold text-sm">Buscar</button>
    </form>

    <!-- Lista de vagas -->
    <div class="flex flex-col gap-3" id="lista-vagas"></div>

  </main>

<script src="{% static 'web_ui/api.js' %}"></script>
<script>
if (Platform.requireAuth()) {
  const MODALIDADES = {onsite: 'Presencial', hybrid: 'Híbrido', remote: 'Remoto'};
  let vagas = [];

  function renderVagas() {
    document.getElementById('resultado-contagem').textContent = `${vagas.length} ${vagas.length === 1 ? 'vaga encontrada' : 'vagas encontradas'} em Macapá e região`;
    document.getElementById('lista-vagas').innerHTML = vagas.map(v => `
      <div class="bg-white border border-slate-200 rounded-[14px] px-4 sm:px-6 py-5 flex flex-col sm:flex-row gap-4 items-start hover:border-blue-300 hover:shadow-lg hover:shadow-blue-700/10 transition">
        <div class="w-[46px] h-[46px] rounded-[10px] bg-slate-100 text-slate-700 flex items-center justify-center font-extrabold text-sm shrink-0">${v.initials}</div>
        <div class="flex-1 flex flex-col gap-2">
          <div>
            <a href="/vagas/${v.slug}/" class="text-base font-bold text-slate-900 hover:text-blue-700">${v.title}</a>
            <p class="text-[13px] text-slate-500">${v.company} · ${v.location}</p>
          </div>
          <div class="flex flex-wrap gap-2">
            <span class="px-2.5 py-1 rounded-full text-xs font-semibold bg-blue-100 text-blue-800">${v.area}</span>
            <span class="px-2.5 py-1 rounded-full text-xs font-semibold bg-slate-100 text-slate-600">${MODALIDADES[v.modality]}</span>
            <span class="px-2.5 py-1 rounded-full text-xs font-semibold bg-slate-100 text-slate-600">${v.weekly_hours}h semanais</span>
            <span class="px-2.5 py-1 rounded-full text-xs font-semibold bg-emerald-50 text-emerald-700">${v.stipend}</span>
          </div>
        </div>
        <div class="w-full sm:w-auto flex flex-row sm:flex-col justify-between items-center sm:items-end gap-2.5 shrink-0">
          <button title="Salvar vaga" aria-label="${v.saved ? 'Remover vaga salva' : 'Salvar vaga'}" onclick="alternarSalvar('${v.slug}')" class="w-[38px] h-[38px] border border-slate-200 hover:border-blue-300 rounded-[10px] bg-white flex items-center justify-center">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="${v.saved ? '#1d4ed8' : 'none'}" stroke="#1d4ed8" stroke-width="2"><path d="M6 3h12v18l-6-4.5L6 21z"/></svg>
          </button>
          <span class="text-xs text-slate-400">${v.published}</span>
        </div>
      </div>`).join('');
  }

  async function carregarVagas(params = new URLSearchParams()) {
    try {
      vagas = await Platform.request('/api/v1/internships/?' + params.toString());
      renderVagas();
    } catch (error) {
      if (error.status === 401) window.location.replace('/');
      else alert(error.message);
    }
  }

  async function alternarSalvar(slug) {
    const vaga = vagas.find((item) => item.slug === slug);
    try {
      await Platform.request(`/api/v1/internships/${slug}/saved/`, {method: vaga.saved ? 'DELETE' : 'PUT'});
      vaga.saved = !vaga.saved;
      renderVagas();
    } catch (error) {
      alert(error.message);
    }
  }
  window.alternarSalvar = alternarSalvar;

  document.getElementById('filtros').addEventListener('submit', (event) => {
    event.preventDefault();
    const params = new URLSearchParams();
    for (const [key, value] of new FormData(event.currentTarget)) if (value) params.set(key, value);
    carregarVagas(params);
  });

  Platform.request('/api/v1/me/profile/').then((profile) => {
    const avatar = document.querySelector('[data-user-initials]');
    avatar.textContent = Platform.initials(profile.full_name);
    avatar.classList.remove('animate-pulse');
  }).catch(() => {
    document.querySelector('[data-user-initials]').classList.remove('animate-pulse');
  });
  carregarVagas();
}
</script>
</body>
</html>
