{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Área da Empresa — Estágios Acadêmicos</title>
<link rel="stylesheet" href="{% static 'css/dist/styles.css' %}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen bg-[#f5f7fb] font-sans text-slate-900 antialiased flex items-center justify-center p-4 md:p-8">

  <div class="w-[980px] max-w-full bg-white border border-slate-200 rounded-[20px] shadow-2xl shadow-slate-900/10 grid grid-cols-1 md:grid-cols-2 overflow-hidden">

    <!-- Coluna do formulário -->
    <div class="p-6 sm:p-8 md:p-11 flex flex-col gap-6">
      <a href="/" class="flex items-center gap-2.5">
        <div class="w-[34px] h-[34px] rounded-[9px] bg-blue-700 text-white flex items-center justify-center font-extrabold text-[17px]">E</div>
        <span class="font-extrabold tracking-tight">Estágios Acadêmicos</span>
      </a>

      <div>
        <h1 class="text-[26px] font-extrabold tracking-tight">Área da empresa</h1>
        <p class="mt-1.5 text-sm text-slate-500 leading-relaxed">Anuncie vagas de estágio e acompanhe os candidatos da sua organização.</p>
      </div>

      <!-- Abas -->
      <div class="flex gap-1 bg-slate-100 rounded-[10px] p-1">
        <button id="tab-entrar" type="button" class="flex-1 h-[42px] rounded-lg font-bold text-sm bg-white text-blue-700 shadow-sm" onclick="mostrarAba('entrar')">Entrar</button>
        <button id="tab-cadastro" type="button" class="flex-1 h-[42px] rounded-lg font-bold text-sm text-slate-500" onclick="mostrarAba('cadastro')">Cadastrar empresa</button>
      </div>

      <!-- Painel: Entrar -->
      <form id="painel-entrar" novalidate class="flex flex-col gap-4">
        <div>
          <label for="login-email" class="block text-[13px] font-semibold text-slate-700 mb-1.5">E-mail corporativo</label>
          <input id="login-email" name="email" type="email" required autocomplete="email" placeholder="contato@suaempresa.com.br" class="w-full h-11 border border-slate-300 rounded-[10px] px-3.5 text-sm outline-none focus:border-blue-700">
        </div>
        <div>
          <div class="flex justify-between items-center mb-1.5">
            <label for="login-password" class="text-[13px] font-semibold text-slate-700">Senha</label>
            <a id="esqueci-senha" href="#" class="text-xs font-semibold text-blue-700 hover:text-blue-800">Esqueci minha senha</a>
          </div>
          <input id="login-password" name="password" type="password" required autocomplete="current-password" placeholder="••••••••" class="w-full h-11 border border-slate-300 rounded-[10px] px-3.5 text-sm outline-none focus:border-blue-700">
        </div>
        <button id="login-submit" type="submit" class="flex items-center justify-center h-[46px] rounded-[10px] bg-blue-700 hover:bg-blue-800 text-white font-bold text-[15px] disabled:opacity-60">Entrar</button>
        <p id="login-status" role="status" aria-live="polite" class="hidden text-sm text-red-700"></p>
      </form>

      <!-- Painel: Cadastro -->
      <form id="painel-cadastro" novalidate class="hidden flex-col gap-4">
        <div>
          <label for="cadastro-razao" class="block text-[13px] font-semibold text-slate-700 mb-1.5">Razão social</label>
          <input id="cadastro-razao" name="legal_name" type="text" required placeholder="Nome da organização" class="w-full h-11 border border-slate-300 rounded-[10px] px-3.5 text-sm outline-none focus:border-blue-700">
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
          <div>
            <label for="cadastro-cnpj" class="block text-[13px] font-semibold text-slate-700 mb-1.5">CNPJ</label>
            <input id="cadastro-cnpj" name="cnpj" type="text" required inputmode="numeric" placeholder="00.000.000/0001-00" class="w-full h-11 border border-slate-300 rounded-[10px] px-3.5 text-sm outline-none focus:border-blue-700">
          </div>
          <div>
            <label for="cadastro-setor" class="block text-[13px] font-semibold text-slate-700 mb-1.5">Setor</label>
            <select id="cadastro-setor" name="sector" required class="w-full h-11 border border-slate-300 rounded-[10px] px-2.5 text-sm bg-white outline-none focus:border-blue-700">
              <option value="">Selecione</option>
              <option>Tecnologia da Informação</option>
              <option>Energia</option>
              <option>Setor público</option>
              <option>Financeiro</option>
              <option>Meio Ambiente</option>
            </select>
          </div>
        </div>
        <div>
          <label for="cadastro-email" class="block text-[13px] font-semibold text-slate-700 mb-1.5">E-mail corporativo</label>
          <input id="cadastro-email" name="email" type="email" required autocomplete="email" placeholder="contato@suaempresa.com.br" class="w-full h-11 border border-slate-300 rounded-[10px] px-3.5 text-sm outline-none focus:border-blue-700">
        </div>
        <div>
          <label for="cadastro-password" class="block text-[13px] font-semibold text-slate-700 mb-1.5">Senha</label>
          <input id="cadastro-password" name="password" type="password" required minlength="8" autocomplete="new-password" placeholder="Mínimo de 8 caracteres" class="w-full h-11 border border-slate-300 rounded-[10px] px-3.5 text-sm outline-none focus:border-blue-700">
        </div>
        <button id="cadastro-submit" type="submit" class="flex items-center justify-center h-[46px] rounded-[10px] bg-blue-700 hover:bg-blue-800 text-white font-bold text-[15px] disabled:opacity-60">Cadastrar empresa</button>
        <p id="cadastro-status" role="status" aria-live="polite" class="hidden text-sm text-red-700"></p>
      </form>

      <p class="text-xs text-slate-400 leading-relaxed">Ao continuar, você concorda com os termos de uso da plataforma. Procurando estágio? <a href="/aluno/" class="font-semibold text-blue-700 hover:text-blue-800">Acesse como aluno</a>.</p>
    </div>

    <!-- Coluna da imagem -->
    <div class="hidden md:block relative bg-slate-100 min-h-[560px]">
      <picture>
        <source media="(min-width: 768px)" srcset="{% static 'web_ui/empresa.jpg' %}">
        <img src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" alt="Equipe de uma empresa reunida em um escritório" loading="lazy" decoding="async" fetchpriority="low" class="absolute inset-0 w-full h-full object-cover">
      </picture>
    </div>

  </div>

<script src="{% static 'web_ui/api.js' %}"></script>
<script>
function mostrarAba(aba) {
  const entrar = aba === 'entrar';
  document.getElementById('painel-entrar').classList.toggle('hidden', !entrar);
  document.getElementById('painel-cadastro').classList.toggle('hidden', entrar);
  document.getElementById('painel-cadastro').classList.toggle('flex', !entrar);
  document.getElementById('tab-entrar').className = 'flex-1 h-[42px] rounded-lg font-bold text-sm ' + (entrar ? 'bg-white text-blue-700 shadow-sm' : 'text-slate-500');
  document.getElementById('tab-cadastro').className = 'flex-1 h-[42px] rounded-lg font-bold text-sm ' + (!entrar ? 'bg-white text-blue-700 shadow-sm' : 'text-slate-500');
}

function nextPage() {
  const next = new URLSearchParams(window.location.search).get('next');
  return Company.safeNextPath(next);
}

function setFormState(form, busy, message = '') {
  const button = form.querySelector('[type="submit"]');
  const status = form.querySelector('[role="status"]');
  form.setAttribute('aria-busy', String(busy));
  button.disabled = busy;
  status.textContent = message;
  status.classList.toggle('hidden', !message);
}

function cnpjValido(bruto) {
  const texto = String(bruto || '').trim();
  if (/[^0-9.\-/ ]/.test(texto)) return false;
  const cnpj = texto.replace(/\D/g, '');
  if (!/^\d{14}$/.test(cnpj) || new Set(cnpj).size === 1) return false;
  const digito = (base, pesos) => {
    const soma = base.split('').reduce((acc, n, i) => acc + Number(n) * pesos[i], 0);
    const valor = 11 - (soma % 11);
    return valor >= 10 ? 0 : valor;
  };
  const primeiro = digito(cnpj.slice(0, 12), [5, 4, 3, 2, 9, 8, 7, 6, 5, 4, 3, 2]);
  const segundo = digito(cnpj.slice(0, 13), [6, 5, 4, 3, 2, 9, 8, 7, 6, 5, 4, 3, 2]);
  return cnpj.slice(-2) === `${primeiro}${segundo}`;
}

function validarEntrar(form) {
  const dados = Object.fromEntries(new FormData(form));
  return FormUI.validate(form, [
    {name: 'email', valid: FormUI.isEmail(dados.email), message: 'Informe um e-mail corporativo válido.'},
    {name: 'password', valid: String(dados.password || '').length > 0, message: 'Informe sua senha.'},
  ]);
}

function validarCadastro(form) {
  const dados = Object.fromEntries(new FormData(form));
  const razao = String(dados.legal_name || '').trim();
  const senha = String(dados.password || '');
  return FormUI.validate(form, [
    {name: 'legal_name', valid: razao.length >= 2, message: 'Informe a razão social (mínimo de 2 caracteres).'},
    {name: 'cnpj', valid: cnpjValido(dados.cnpj), message: 'Informe um CNPJ válido.'},
    {name: 'sector', valid: !!dados.sector, message: 'Selecione o setor da empresa.'},
    {name: 'email', valid: FormUI.isEmail(dados.email), message: 'Informe um e-mail corporativo válido.'},
    {name: 'password', valid: senha.length >= 8 && !/^\d+$/.test(senha), message: 'A senha deve ter ao menos 8 caracteres e não pode ser apenas numérica.'},
  ]);
}

['painel-entrar', 'painel-cadastro'].forEach((id) => {
  const form = document.getElementById(id);
  form.addEventListener('input', (event) => FormUI.clearFieldError(event.target));
  form.addEventListener('change', (event) => FormUI.clearFieldError(event.target));
});

document.getElementById('painel-entrar').addEventListener('submit', async (event) => {
  event.preventDefault();
  if (!validarEntrar(event.currentTarget)) return;
  setFormState(event.currentTarget, true, 'Entrando…');
  const form = new FormData(event.currentTarget);
  try {
    const session = await Company.request('/api/v1/company/auth/login/', {method: 'POST', body: JSON.stringify(Object.fromEntries(form))});
    Company.storeSession(session);
    window.location.assign(nextPage());
  } catch (error) {
    setFormState(event.currentTarget, false, error.message);
  }
});

document.getElementById('painel-cadastro').addEventListener('submit', async (event) => {
  event.preventDefault();
  if (!validarCadastro(event.currentTarget)) return;
  setFormState(event.currentTarget, true, 'Cadastrando empresa…');
  const form = new FormData(event.currentTarget);
  try {
    const session = await Company.request('/api/v1/company/auth/register/', {method: 'POST', body: JSON.stringify(Object.fromEntries(form))});
    Company.storeSession(session);
    window.location.assign(nextPage());
  } catch (error) {
    setFormState(event.currentTarget, false, error.message);
  }
});

document.getElementById('esqueci-senha').addEventListener('click', (event) => {
  event.preventDefault();
  const status = document.getElementById('login-status');
  status.textContent = 'Entre em contato com o suporte para redefinir a senha da sua empresa.';
  status.classList.remove('hidden');
});
</script>
</body>
</html>
